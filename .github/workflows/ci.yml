name: CineSwipe CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Obtener Código Fuente
        uses: actions/checkout@v4

      - name: Preparar Entorno Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cachear Dependencias NPM
        uses: actions/cache@v4
        id: npm-cache 
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Instalación limpia de Dependencias
        run: npm ci

      - name: Ejecutar ESLint
        run: npm run lint

  test:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - run: npm ci

      - name: Ejecutar Vitest
        run: npm run test
        env:
          VITE_TMDB_KEY: 'test_key_placeholder' 

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - run: npm ci

      - name: Compilar Proyecto (Vite Build)
        run: npm run build
        env:
          VITE_TMDB_KEY: ${{ secrets.VITE_TMDB_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Archivar Artefactos de Producción
        uses: actions/upload-artifact@v4
        with:
          name: cineswipe-dist-bundle
          path: dist/
          retention-days: 7
